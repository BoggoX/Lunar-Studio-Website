<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Settings - Simple Site</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Arial;margin:40px;color:#222}
    header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
    .logo{font-weight:700;font-size:20px}
    .segmented{display:flex;background:#f0f0f0;border-radius:8px;overflow:hidden}
    .segmented a{display:inline-block;padding:8px 12px;text-decoration:none;color:inherit}
    .segmented a.active{background:#2563eb;color:#fff}
    main{border:1px solid #e6e6e6;border-radius:8px;padding:20px;min-height:180px}
  </style>
</head>
<body>
  <header>
    <div class="logo">My Simple Site</div>
    <nav>
      <div class="segmented" role="tablist" aria-label="Sections">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="settings.html" class="active" aria-current="page">Settings</a>
      </div>
    </nav>
  </header>

  <main>
    <h2>Settings</h2>
    <p>Adjust the slider to change a value for this page:</p>
    <label for="range">Value: <span id="rangeVal">50</span></label><br/>
    <input id="range" type="range" min="0" max="100" value="50" />
  </main>

  <script>
    const range = document.getElementById('range');
    const rangeVal = document.getElementById('rangeVal');
    range.addEventListener('input', () => rangeVal.textContent = range.value);
  </script>
</body>
</html>
